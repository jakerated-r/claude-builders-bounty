name: validate-weekly-dev-summary

on:
  workflow_dispatch:
  push:
    paths: ["workflows/weekly-dev-summary/**"]
  pull_request:
    paths: ["workflows/weekly-dev-summary/**"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run workflow validator (29 checks, stdlib-only)
        run: python3 workflows/weekly-dev-summary/validate_workflow.py workflows/weekly-dev-summary/n8n-weekly-dev-summary.workflow.json
